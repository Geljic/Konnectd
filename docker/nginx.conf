server {
    listen 80;
    server_name _;

    # Expo web static build
    root /usr/share/nginx/html;
    index index.html;

    # Serve .gz files precompressed at build time (Dockerfile), and gzip
    # anything else on the fly. The JS bundle is multi-MB uncompressed —
    # this is the single biggest first-load win.
    gzip_static on;
    gzip on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_vary on;
    gzip_types
        application/javascript
        application/json
        text/css
        text/plain
        image/svg+xml
        font/ttf
        font/otf;

    # PocketBase REST API + admin
    location /api/ {
        proxy_pass http://pocketbase:8090/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /_/ {
        proxy_pass http://pocketbase:8090/_/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Hashed build output — safe to cache forever.
    location /_expo/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # Public legal/support pages. Keep these before the SPA fallback so app
    # routing does not capture them.
    location = /privacy {
        try_files /privacy/index.html =404;
    }

    location /privacy/ {
        try_files $uri $uri/ /privacy/index.html =404;
    }

    location = /terms {
        try_files /terms/index.html =404;
    }

    location /terms/ {
        try_files $uri $uri/ /terms/index.html =404;
    }

    location = /support {
        try_files /support/index.html =404;
    }

    location /support/ {
        try_files $uri $uri/ /support/index.html =404;
    }

    # SPA fallback — index.html must always revalidate so deploys roll out.
    location / {
        add_header Cache-Control "no-cache";
        try_files $uri $uri/ /index.html;
    }
}
